<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Głosowanie | Złote Franciszki</title>

    <!-- Czcionki -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="container">

    <h1>ZŁOTE FRANCISZKI</h1>

    <!-- Pasek postępu -->
    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <p class="progress-text">
        Kategoria <span id="currentCategory">1</span> z <span id="totalCategories">3</span>
    </p>

    <!-- Nazwa kategorii -->
    <h2 id="categoryTitle">Najlepszy Film</h2>

    <!-- Miejsce na filmy -->
    <div id="moviesContainer">

        <!-- Film 1 -->
        <div class="movie-card">

            <h3>Film 1</h3>

            <iframe
                src="https://www.youtube.com/watch?v=b_4s6zCOy9k"
                title="Film 1"
                allowfullscreen>
            </iframe>

            <label>
                <input type="radio" name="vote" value="Film 1">
                Głosuję na ten film
            </label>

        </div>

        <!-- Film 2 -->

    <!-- Przyciski -->

        <button id="prevBtn">
            ← Poprzednia

</div>

<script src="script.js"></script>
